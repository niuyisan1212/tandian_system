# ============================================
# 探店路线规划系统 - Docker Compose 配置
# 项目前缀: td (tandian)
# ============================================

version: '3.8'

services:
  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: td-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - td-network
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: td-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://td-mysql:3306/tandian_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=niuhaoqing1212
    depends_on:
      - mysql
    networks:
      - td-network
    restart: unless-stopped

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: td-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=niuhaoqing1212
      - MYSQL_DATABASE=tandian_system
      - TZ=Asia/Shanghai
    volumes:
      - td-mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - td-network
    restart: unless-stopped

networks:
  td-network:
    name: td-network
    driver: bridge

volumes:
  td-mysql-data:
    name: td-mysql-data
